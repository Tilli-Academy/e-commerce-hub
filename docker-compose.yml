services:
  postgres:
    image: postgres:16-alpine
    container_name: shophub-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: shophub
      POSTGRES_PASSWORD: shophub_secret
      POSTGRES_DB: ecommerce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shophub -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shophub-app
    restart: unless-stopped
    ports:
      - "5500:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://shophub:shophub_secret@postgres:5432/ecommerce
      CLIENT_URL: http://localhost:5500
    env_file:
      - .env.docker
    command: sh -c "npx drizzle-kit migrate && node server.js"

  client:
    image: node:20-alpine
    container_name: shophub-client
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - client_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_URL: http://app:5000
    command: sh -c "npm install && npx vite --host"
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
  client_modules:
    driver: local
